[project]
name = "gokce-toptan-backend"
version = "0.1.0"
description = "Gökçe Toptan Perakende — FastAPI backend"
requires-python = ">=3.11"
dependencies = [
    "fastapi[standard]>=0.115",
    "uvicorn[standard]>=0.32",
    "sqlalchemy[asyncio]>=2.0.35",
    "asyncpg>=0.30",
    "psycopg2-binary>=2.9",
    "alembic>=1.14",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "python-jose[cryptography]>=3.3",
    "argon2-cffi>=23.1",
    "python-multipart>=0.0.17",
    "boto3>=1.35",
    "slowapi>=0.1.9",
    "websockets>=13.1",
    "httpx>=0.27",
    "email-validator>=2.2",
    "typer>=0.13",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "ruff>=0.8",
    "mypy>=1.13",
    "httpx>=0.27",
    "aiosqlite>=0.20",
]

[tool.ruff]
line-length = 100
target-version = "py311"
# Alembic migration'ları auto-generated; bunları lint'lemek standart değil.
extend-exclude = ["app/db/migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM", "RUF"]
ignore = [
    "E501",
    # RUF001/002/003: Türkçe metinlerdeki "ı/İ/ş/ç" gibi karakterler Latin
    # harflere benziyor diye "ambiguous unicode" uyarısı veriyor. Kod tabanı
    # baştan sona Türkçe olduğu için bunlar kasıtlı.
    "RUF001",
    "RUF002",
    "RUF003",
    # UP042: str+Enum miras alan enum'lar DB enum değerlerine values_callable ile
    # map'leniyor; StrEnum'a çevirmek davranışı değiştirebilir, kasıtlı bırakıldı.
    "UP042",
    # RUF012: Pydantic model alanlarındaki list/dict default'ları için yanlış
    # pozitif (Pydantic zaten default'ları kopyalar); ClassVar önerisi yanlış.
    "RUF012",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["app/tests"]
pythonpath = ["."]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
