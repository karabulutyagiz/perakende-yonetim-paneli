name: gokce_toptan
description: ParaSende — toptancıdan sipariş ve müşteri yönetim uygulaması
publish_to: "none"
version: 1.0.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  go_router: ^14.6.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  web_socket_channel: ^3.0.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  collection: ^1.18.0
  fl_chart: ^0.69.0
  image_picker: ^1.1.2
  image_gallery_saver_plus: ^4.0.1
  path_provider: ^2.1.5
  pdf: ^3.11.1
  permission_handler: ^11.3.1
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/parasende.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F8F2E5"
  adaptive_icon_foreground: "assets/icon/parasende.png"
  web:
    generate: false
