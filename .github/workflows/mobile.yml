name: mobile

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"
  pull_request:
    paths:
      - "mobile/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    # Job-level env: secret'ları if'te kontrol edebilmek için (secrets context if'te kullanılamaz).
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.27.x"

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test --no-pub

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      # Release keystore — sadece push to main / workflow_dispatch durumunda
      # GitHub Secrets'tan çözülüp android/key.properties oluşturulur.
      # PR build'lerinde secret olmadığı için bu adım atlanır → debug imzalı APK çıkar.
      - name: Decode release keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/parasende.jks
          cat > android/key.properties <<EOF
          storeFile=parasende.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
          echo "Release signing hazır"

      - name: Build release AAB (Play Store)
        run: |
          flutter build appbundle --release \
            --dart-define=API_BASE=https://toptanperakende.online/api/v1 \
            --dart-define=WS_BASE=wss://toptanperakende.online/api/v1/ws

      - name: Build release APK (direkt indirme / yan yükleme)
        run: |
          flutter build apk --release \
            --dart-define=API_BASE=https://toptanperakende.online/api/v1 \
            --dart-define=WS_BASE=wss://toptanperakende.online/api/v1/ws

      - uses: actions/upload-artifact@v4
        with:
          name: mobile-aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        with:
          name: mobile-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
