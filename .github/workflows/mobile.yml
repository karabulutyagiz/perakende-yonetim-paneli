name: mobile

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"
  pull_request:
    paths:
      - "mobile/**"

jobs:
  analyze:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.x"
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --no-pub
